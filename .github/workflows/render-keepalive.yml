# Optional: ping the deployed API on a schedule so free/sleepy hosts get HTTP traffic.
# Add repo secret RENDER_HEALTH_URL = https://your-service.onrender.com/ping
# (or /health). Disable the workflow if you use UptimeRobot/cron-job.org instead.

name: API keep-alive ping

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health URL
        env:
          URL: ${{ secrets.RENDER_HEALTH_URL }}
        run: |
          if [ -z "$URL" ]; then
            echo "RENDER_HEALTH_URL secret is not set — skipping."
            exit 0
          fi
          curl -sfS "$URL"
          echo "OK"
